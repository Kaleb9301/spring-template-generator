name: Generate Spring Project

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "New repository name (e.g. my-service)"
        required: true
        type: string
      base_package:
        description: "Base Java package (e.g. com.acme.myservice)"
        required: true
        type: string
      application_class:
        description: "Main Spring Boot application class (e.g. MyServiceApplication)"
        required: true
        type: string
      visibility:
        description: "public or private"
        required: true
        default: "public"
        type: choice
        options: [public, private]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout generator repo (this repo)
        uses: actions/checkout@v4
        with:
          path: generator

      - name: Checkout template repo
        uses: actions/checkout@v4
        with:
          repository: Kaleb9301/spring-template
          path: template

      - name: Rewrite package/class/pom.xml
        run: |
          chmod +x "${GITHUB_WORKSPACE}/generator/scripts/generate.sh"
          "${GITHUB_WORKSPACE}/generator/scripts/generate.sh" \
            "${GITHUB_WORKSPACE}/template" \
            "${{ inputs.repo_name }}" \
            "${{ inputs.base_package }}" \
            "${{ inputs.application_class }}"

      - name: Create new repository and push generated code
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
          OWNER: Kaleb9301
          REPO: ${{ inputs.repo_name }}
          VIS: ${{ inputs.visibility }}
        run: |
          set -euo pipefail
          api="https://api.github.com"

          echo "Creating repo ${OWNER}/${REPO} (${VIS})"
          curl -sS -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api}/user/repos" \
            -d "{\"name\":\"${REPO}\",\"private\":$( [ "${VIS}" = "private" ] && echo true || echo false )}" > /dev/null

          cd "${GITHUB_WORKSPACE}/template"
          rm -rf .git
          git init
          git config user.name "spring-template-generator"
          git config user.email "spring-template-generator@users.noreply.github.com"
          git add -A
          git commit -m "Initial commit from template"
          git branch -M main
          git remote add origin "https://x-access-token:${TOKEN}@github.com/${OWNER}/${REPO}.git"
          git push -u origin main