name: Generate Spring Project

on:
  workflow_dispatch:
    inputs:
      repo_name:
        description: "New repository name (e.g., my-service)"
        required: true
        type: string

      visibility:
        description: "public or private"
        required: true
        default: "public"
        type: choice
        options: [public, private]

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout generator repo
      - name: Checkout generator repo
        uses: actions/checkout@v4
        with:
          path: generator

      # 2. Checkout template repo
      - name: Checkout template repo
        uses: actions/checkout@v4
        with:
          repository: Kaleb9301/spring-template
          path: template

      # 3. Generate package + class + apply template changes
      - name: Rewrite package/class/pom.xml
        run: |
          set -euo pipefail

          chmod +x "${GITHUB_WORKSPACE}/generator/scripts/generate.sh"

          # Safe package name
          SAFE_NAME=$(echo "${{ inputs.repo_name }}" | tr '-' '_')
          BASE_PACKAGE="com.bankofabyssinia.${{ inputs.repo_name }}"

          # Convert repo name → PascalCase (SpringTemplate → SpringTemplateApplication)
          APP_NAME=$(echo "${{ inputs.repo_name }}" \
            | sed -r 's/(^|[-_])([a-zA-Z])/\U\2/g' \
            | tr -d '-')

          APPLICATION_CLASS="${APP_NAME}Application"

          echo "Repo Name: ${{ inputs.repo_name }}"
          echo "Base Package: ${BASE_PACKAGE}"
          echo "Application Class: ${APPLICATION_CLASS}"

          "${GITHUB_WORKSPACE}/generator/scripts/generate.sh" \
            "${GITHUB_WORKSPACE}/template" \
            "${{ inputs.repo_name }}" \
            "${BASE_PACKAGE}" \
            "${APPLICATION_CLASS}"

      # 4. Create GitHub repository
      - name: Create GitHub repository
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
          OWNER: Kaleb9301
          REPO: ${{ inputs.repo_name }}
          VIS: ${{ inputs.visibility }}
        run: |
          set -euo pipefail

          api="https://api.github.com"

          echo "Creating repo ${OWNER}/${REPO} (${VIS})"

          payload="{\"name\":\"${REPO}\",\"private\":$( [ "${VIS}" = "private" ] && echo true || echo false )}"

          resp="$(curl -sS -w '\n%{http_code}' -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api}/user/repos" \
            -d "${payload}")"

          body="$(echo "$resp" | head -n -1)"
          code="$(echo "$resp" | tail -n 1)"

          echo "HTTP ${code}"
          echo "${body}"

          if [[ "${code}" != "201" ]]; then
            echo "Repository creation failed"
            exit 1
          fi

          sleep 3

      # 5. Push generated project to new repo (SAFE FIXED VERSION)
      - name: Push generated code
        env:
          TOKEN: ${{ secrets.REPO_TOKEN }}
          OWNER: Kaleb9301
          REPO: ${{ inputs.repo_name }}
        run: |
          set -euo pipefail

          cd "${GITHUB_WORKSPACE}/template"

          # 🔥 IMPORTANT: clean git state
          rm -rf .git

          git init
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Initial commit from template"

          git branch -M main

          # Safe remote handling
          git remote add origin https://x-access-token:${TOKEN}@github.com/${OWNER}/${REPO}.git

          git push -u origin main
